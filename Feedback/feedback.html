<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback | Plant Kingdom</title>
    <link rel="stylesheet" href="./feedback.css">
</head>
<body>
    <div class="feedback-container">
        <header>
            <h1>Share Your Feedback</h1>
            <a href="../front/front.html" class="back-btn">← Back to Home</a>
        </header>

        <section class="form-wrapper">
            <div class="intro-text">
                <p>We would love to hear your thoughts about the <b>Plant Kingdom</b> project! Please let us know how we can improve.</p>
            </div>

            <form action="#" method="post">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="regno">Registertion Number</label>
                    <input type="regno" id="regno" name="regno" placeholder="Enter your Registertion number" required>
                </div>

                <div class="input-group">
                    <label for="fav-plant">Which plant type did you enjoy learning about most?</label>
                    <select id="fav-plant" name="fav-plant">
                        <option value="herbs">Herbs</option>
                        <option value="shrubs">Shrubs</option>
                        <option value="trees">Trees</option>
                        <option value="climbers">Climbers</option>
                        <option value="creepers">Creepers</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="message">Your Comments</label>
                    <textarea id="message" name="message" rows="5" placeholder="Tell us what you think..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit Feedback</button>
            </form>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Plant Kingdom Project | Designed by Jayanth S</p>
    </footer>
</body>
</html>
